<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Anirudhan LeetCode Sync</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="lls-options">
    <main class="lls-options-panel">
      <h1>Anirudhan LeetCode Sync</h1>
      <label>
        Server URL
        <input id="serverUrl" type="text" placeholder="http://127.0.0.1:8766">
      </label>
      <label>
        Local token
        <input id="token" type="password" placeholder="Paste the token printed by the Python server">
      </label>
      <div class="lls-options-actions">
        <button id="save" type="button">Save</button>
        <button id="test" class="lls-secondary" type="button">Test server</button>
      </div>
      <pre id="status">Start the Python helper, then paste its token here.</pre>
    </main>
    <script src="options.js"></script>
  </body>
</html>
